name: CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Installer Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: Installer dépendances
        run: pip install -r requirements.txt

      - name: Lancer tests
        run: pytest

      - name: Vérifier code
        run: flake8